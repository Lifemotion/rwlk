name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            binary: rwlk.exe
            archive: rwlk-win-x64.zip
          - rid: linux-x64
            os: ubuntu-latest
            binary: rwlk
            archive: rwlk-linux-x64.tar.gz
          - rid: linux-arm64
            os: ubuntu-latest
            binary: rwlk
            archive: rwlk-linux-arm64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install cross-compilation tools
        if: matrix.rid == 'linux-arm64'
        run: |
          sudo dpkg --add-architecture arm64
          # Replace all sources with arch-qualified versions
          sudo rm -f /etc/apt/sources.list.d/arm64.list
          sudo bash -c 'cat > /etc/apt/sources.list.d/ports-arm64.sources << SRCEOF
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports/
          Suites: noble noble-updates noble-security
          Components: main restricted universe
          Architectures: arm64
          SRCEOF'
          # Pin existing sources to amd64 only
          for f in /etc/apt/sources.list.d/ubuntu.sources; do
            if [ -f "$f" ] && ! grep -q "Architectures:" "$f"; then
              sudo sed -i '/^Types:/a Architectures: amd64' "$f"
            fi
          done
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu zlib1g-dev:arm64

      - name: Publish
        run: dotnet publish -c Release -r ${{ matrix.rid }} -o out

      - name: Create archive
        shell: bash
        run: |
          cd out
          if [[ "${{ matrix.archive }}" == *.zip ]]; then
            7z a ../${{ matrix.archive }} ${{ matrix.binary }}
          else
            tar czf ../${{ matrix.archive }} ${{ matrix.binary }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: rwlk-*
          generate_release_notes: true
